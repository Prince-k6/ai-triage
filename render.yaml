services:
  - type: web
    name: ai-triage-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard
      - key: SECRET_KEY
        sync: false # Set this in the Render dashboard to a secure random string
